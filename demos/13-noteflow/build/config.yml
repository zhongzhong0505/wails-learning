version: '3'

info:
  companyName: "Wails Learning"
  productName: "NoteFlow"
  productIdentifier: "io.wails.learning.noteflow"
  description: "A cross-platform note-taking application built with Wails v3"
  copyright: "(c) 2025, Wails Learning"
  comments: "Wails v3 Tutorial Demo 13 - Full Project"
  version: "0.1.0"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
      - "*_test.go"
    watched_extension:
      - "*.go"
    git_ignore: true
  executes:
    - cmd: wails3 task common:build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary
