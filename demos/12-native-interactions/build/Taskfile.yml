version: '3'

tasks:
  go:mod:tidy:
    internal: true
    cmds:
      - go mod tidy

  install:frontend:deps:
    dir: frontend
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules
    cmds:
      - npm install

  build:frontend:
    dir: frontend
    deps:
      - task: install:frontend:deps
      - task: generate:bindings
    cmds:
      - npm run {{if eq .DEV "true"}}build:dev{{else}}build{{end}}

  generate:bindings:
    deps:
      - task: go:mod:tidy
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - frontend/bindings/**/*
    cmds:
      - wails3 generate bindings -f '{{.BUILD_FLAGS}}' -clean=true

  build:
    deps:
      - task: build:frontend
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
    cmds:
      - go build -buildvcs=false {{.BUILD_FLAGS}} -o {{.BIN_DIR}}/{{.APP_NAME}}
    vars:
      BUILD_FLAGS: '{{.BUILD_FLAGS | default ""}}'

  dev:frontend:
    deps:
      - task: install:frontend:deps
    dir: frontend
    cmds:
      - npm run dev -- --port {{.VITE_PORT}} --strictPort
